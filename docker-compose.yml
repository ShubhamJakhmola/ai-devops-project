version: '3.9'

services:

  backend:
    build: .
    container_name: fastapi_backend
    restart: unless-stopped

    ports:
      - "8000:8000"

    depends_on:
      - db
      - redis

    env_file:
      - .env

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis_server
    restart: unless-stopped

    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend